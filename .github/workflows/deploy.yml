name: Deploy Main Branch

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v3

    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and Push Backend Image
      uses: docker/build-push-action@v4
      with:
        context: .
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/aws-quiz-be:main
        platforms: linux/amd64

    - name: Copy Docker Compose and Nginx config to EC2
      uses: appleboy/scp-action@master
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ec2-user
        key: ${{ secrets.EC2_SSH_KEY }}
        source: "docker-compose.prod.yml,nginx/"
        target: "/home/ec2-user/aws-quiz-be"

    - name: Deploy to EC2
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ec2-user
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          set -e
          CERT_PATH="/home/ec2-user/aws-quiz-be/certbot/conf/live/api.awsquizkr.com/fullchain.pem"
          mkdir -p /home/ec2-user/aws-quiz-be
          cd /home/ec2-user/aws-quiz-be

          # docker compose(v2) 필수 확인
          if ! sudo docker compose version >/dev/null 2>&1; then
            echo "❌ docker compose(v2)가 설치되어 있지 않습니다."
            echo "   EC2에서 docker-compose-plugin 설치 후 다시 실행하세요."
            exit 1
          fi

          # 1. 배포용 .env 생성
          rm -f .env
          echo "${{ secrets.PROD_ENV_FILE }}" > .env
          echo "DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }}" >> .env

          # 1-1. prod compose를 기본 compose 파일로 복사
          cp -f docker-compose.prod.yml docker-compose.yml

          # 2. 인증서 유무에 따라 Nginx 설정 선택
          if [ -f "$CERT_PATH" ]; then
            echo "NGINX_CONF_FILE=nginx.conf" >> .env
          else
            echo "NGINX_CONF_FILE=nginx.conf.init" >> .env
          fi

          # 3. 최신 이미지 배포
          sudo docker login -u "${{ secrets.DOCKER_USERNAME }}" -p "${{ secrets.DOCKER_PASSWORD }}"
          sudo docker pull ${{ secrets.DOCKER_USERNAME }}/aws-quiz-be:main
          sudo docker compose up -d --force-recreate

          # 4. SSL 인증서가 없으면 최초 발급, 있으면 갱신
          if [ ! -f "$CERT_PATH" ]; then
            echo "ℹ️ SSL 인증서 없음 - 최초 발급 진행"
            set +e
            sudo docker compose run --rm certbot certonly \
              --webroot -w /var/www/certbot \
              -d api.awsquizkr.com \
              --email "${{ secrets.LETSENCRYPT_EMAIL }}" \
              --agree-tos --no-eff-email --non-interactive
            CERT_ISSUE_EXIT_CODE=$?
            set -e

            if [ -f "$CERT_PATH" ]; then
              echo "✅ 인증서 발급 성공 - HTTPS 설정으로 전환"
              sed -i 's/^NGINX_CONF_FILE=.*/NGINX_CONF_FILE=nginx.conf/' .env
              sudo docker compose up -d --force-recreate nginx
            else
              echo "⚠️ 인증서 발급 실패(코드: $CERT_ISSUE_EXIT_CODE) - 현재는 HTTP(init)로 유지"
              echo "   DNS/보안그룹(80)/도메인 연결 확인 후 다음 배포에서 자동 재시도됩니다."
            fi
          else
            sudo docker compose run --rm certbot renew --quiet || true
            sudo docker compose restart nginx || true
          fi

          # 5. 안 쓰는 이미지 청소
          sudo docker image prune -f