services:
  app:
    build: .
    command: sh -c "npm install && npm run start:dev"
    env_file:
      - .env
    ports:
      - "3001:3001"
    volumes:
      - .:/app
      - app_node_modules:/app/node_modules
    depends_on:
      - mysql
      - mongodb

  mysql:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  mongodb:
    image: mongo:latest
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  app_node_modules:
  mysql_data:
  mongo_data:
